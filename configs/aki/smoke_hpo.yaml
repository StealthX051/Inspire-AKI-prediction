paths:
  artifacts_dir: /media/volume/ncs_inspire_data/ncs_aki/artifacts/smoke_hpo

runtime:
  profile: balanced
  progress_interval_seconds: 60
  orchestration:
    mode: serial

splits:
  use_bootstrapping: false

models:
  tabular_enabled:
    - log_reg
  sequence_enabled:
    - lstm_only
  tabular_hpo_enabled:
    - log_reg
    - xgb
    - rf
    - svm
    - mlp
    - knn
  sequence_hpo_enabled:
    - lstm_only
    - hybrid
  hpo:
    n_trials: 1
    tabular_mlp_epochs: 10
    sequence_epochs: 3
    sequence_patience: 5
    sequence_batch_size: 1024
  tabular_hpo_search_spaces:
    log_reg: {C: [0.1, 1.0]}
    xgb: {n_estimators: [25, 50], learning_rate: [0.05, 0.1], max_depth: [3, 4], subsample: [0.8, 1.0], colsample_bytree: [0.8, 1.0], gamma: [0.0, 0.5]}
    rf: {n_estimators: [25, 50], max_depth: [4, 8], min_samples_split: [2, 4], min_samples_leaf: [1, 3]}
    svm: {C: [0.01, 1.0]}
    knn: {n_neighbors: [3, 15]}
    mlp: {lr: [0.0005, 0.005], n_layers: [1, 2], n_units: [8, 32], dropout_rate: [0.1, 0.3]}
  sequence_hpo_search_spaces:
    lstm_only: {lr: [0.0005, 0.005], lstm_hidden_size: [8, 32], lstm_num_layers: [1, 2], dropout_rate: [0.1, 0.3]}
    hybrid: {lr: [0.0005, 0.005], lstm_hidden_size: [8, 32], lstm_num_layers: [1, 2], n_mlp_layers: [1, 2], mlp_layer_size: [8, 32], dropout_rate: [0.1, 0.3]}
  sequence_defaults:
    learning_rate: 0.001
    epochs: 3
    batch_size: 256
    patience: 1
    es_check_interval: 1
    lr_scheduler_patience: 1
    lr_scheduler_factor: 0.1
    gradient_clip_value: 1.0
    lstm_hidden_size: 32
    lstm_num_layers: 1
    mlp_dims: [32]
    dropout_rate: 0.2

calibration:
  cv_folds: 3
  threshold_steps: 50

evaluation:
  bootstrap_reps: 100
  dca_threshold_step: 0.01

reports:
  figure_dpi: 120
  max_display_features: 10
  manuscript_sections:
    - consort
    - tables
    - curves
    - shap
  shap_jobs:
    - {run_name: LogReg_Combined_Smoke, model_key: log_reg, dataset_regime: combined}
