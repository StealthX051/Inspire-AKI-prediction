paths:
  artifacts_dir: /media/volume/ncs_inspire_data/ncs_aki/artifacts/default
  raw_inspire_dir: /media/volume/ncs_inspire_data/ncs_aki/data/inspire
  compat_aki_dir: /media/volume/ncs_inspire_data/ncs_aki/data/AKI
  compat_base_dir: /media/volume/ncs_inspire_data/ncs_aki/data/base
  compat_results_dir: /media/volume/ncs_inspire_data/ncs_aki/data/AKI/results
study:
  cohort_key: strict_noncardiac_adult_procedure_audit
  outcome_key: aki

evaluation_mode: grouped_nested_cv

clinical_baselines:
  gs_aki:
    intraperitoneal_map_path: configs/clinical_baselines/intraperitoneal_proxy_map_5char.csv
    diabetes_prefixes: [E08, E09, E10, E11, E13]
    hypertension_prefixes: [I10, I11, I12, I13, I15, I16, I1A]
    chf_prefixes: [I50]
    ascites_prefixes: [R18]
    recent_window_days: 30
    class_cutpoints:
      I: [0, 2]
      II: [3, 3]
      III: [4, 4]
      IV: [5, 5]
      V: [6, 9]
    score_max: 9

cohorts:
  profiles:
    default_noncardiac_adult:
      preop_window_days: 90
      postop_windows_days: [2, 7]
      max_preop_creatinine: 4.5
      min_age: 18
      max_asa_exclusive: 6
      exclude_antype: ["Regional"]
      department_include: []
      department_exclude: ["PED"]
      include_icd10_prefixes: []
      exclude_icd10_prefixes: ["10", "0TY", "B50", "B51"]
      require_height_weight: true
      require_positive_op_len: true
      cardiovascular_prefix: "I"
      creatinine_item_name: "creatinine"
      dialysis_item_name: "crrt"
      procedure_audit_resolution:
        enabled: false
        exclude_audit_classes: ["cardiac_exclude"]
        exclude_manual_review_buckets:
          - cpb_positive_aortic_or_vascular
          - respiratory_plus_cpb
          - other_cpb_discordant_nonvascular_nonrespiratory
          - other_prefix_level_review
        retain_unresolved_cpb_negative_with_benign_neighbor: true
        benign_neighbor_keywords:
          - scalp skin
          - sternum
          - chest wall
          - external ear
          - conjunctiva
          - breast
    strict_noncardiac_adult_procedure_audit:
      preop_window_days: 90
      postop_windows_days: [2, 7]
      max_preop_creatinine: 4.5
      min_age: 18
      max_asa_exclusive: 6
      exclude_antype: ["Regional"]
      department_include: []
      department_exclude: ["PED"]
      include_icd10_prefixes: []
      exclude_icd10_prefixes: ["10", "0TY", "B50", "B51", "02"]
      require_height_weight: true
      require_positive_op_len: true
      cardiovascular_prefix: "I"
      creatinine_item_name: "creatinine"
      dialysis_item_name: "crrt"
      procedure_audit_resolution:
        enabled: true
        exclude_audit_classes: ["cardiac_exclude"]
        exclude_manual_review_buckets:
          - cpb_positive_aortic_or_vascular
          - respiratory_plus_cpb
          - other_cpb_discordant_nonvascular_nonrespiratory
          - other_prefix_level_review
        retain_unresolved_cpb_negative_with_benign_neighbor: true
        benign_neighbor_keywords:
          - scalp skin
          - sternum
          - chest wall
          - external ear
          - conjunctiva
          - breast
outcomes:
  catalog:
    aki:
      kind: aki
      target_column: aki_boolean
      display_name: Postoperative AKI
      positive_label: Postoperative AKI
      negative_label: No postoperative AKI
      required_sources: [labs, ward_vitals]
    macce:
      kind: composite
      target_column: macce
      display_name: 30-day MACCE
      positive_label: 30-day MACCE
      negative_label: No 30-day MACCE
      required_sources: [diagnosis]
      window_days: 30
      component_keys:
        - macce_mi
        - macce_stroke
        - macce_angina
        - macce_hf
        - macce_cardiac_arrest
      component_diagnosis_prefixes:
        macce_mi: [I21]
        macce_stroke: [I63]
        macce_angina: [I20]
        macce_hf: [I50]
        macce_cardiac_arrest: [I46]
    pna:
      kind: diagnosis_window
      target_column: pna
      display_name: 30-day PNA
      positive_label: 30-day PNA
      negative_label: No 30-day PNA
      required_sources: [diagnosis]
      diagnosis_prefixes: [J11, J12, J13, J14, J15, J16, J17, J18]
      window_days: 30
    pe:
      kind: diagnosis_window
      target_column: pe
      display_name: 30-day PE
      positive_label: 30-day PE
      negative_label: No 30-day PE
      required_sources: [diagnosis]
      diagnosis_prefixes: [I26]
      window_days: 30
    postop_icu_admission:
      kind: time_comparison
      target_column: postop_icu_admission
      display_name: Postoperative ICU Admission
      positive_label: Postoperative ICU Admission
      negative_label: No postoperative ICU Admission
      required_sources: [operations]
      source_column: icuin_time
      reference_column: opend_time
      comparison_rule: strictly_after
    postop_mortality_30d:
      kind: time_comparison
      target_column: postop_mortality_30d
      display_name: 30-day Mortality
      positive_label: 30-day Mortality
      negative_label: No 30-day Mortality
      required_sources: [operations]
      source_column: allcause_death_time
      reference_column: opend_time
      comparison_rule: strictly_after_within_window
      window_days: 30
features:
  preop_lab_items:
    - total_protein
    - sodium
    - potassium
    - platelet
    - glucose
    - wbc
    - alt
    - chloride
    - lymphocyte
    - phosphorus
    - albumin
    - fibrinogen
    - creatinine
    - ptinr
    - total_bilirubin
    - alp
    - aptt
    - calcium
    - bun
    - ast
    - crp
    - hb
    - hct
    - seg
  ward_items:
    - spo2
    - bt
    - rr
    - nibp_dbp
    - nibp_sbp
    - hr
  high_frequency_labels:
    - rr
    - hr
    - spo2
    - fio2
    - pmean
    - etco2
    - peep
    - pip
    - art_mbp
    - cpat
    - vt
    - art_sbp
    - art_dbp
    - minvol
    - pplat
    - bt
    - etgas
    - cvp
  medium_frequency_labels:
    - pap_mbp
    - pap_sbp
    - pap_dbp
    - nibp_mbp
    - nibp_dbp
    - nibp_sbp
  cross_sec_avg_labels:
    - bis
    - ci
    - rfti
    - dobui
    - mlni
    - ppfi
    - o2
    - air
    - cbro2
    - ntgi
  wt_adjusted_labels:
    - eph
    - mdz
    - ppf
    - sft
  time_adjusted_labels:
    - n2o
    - ebl
    - rbc
    - uo
    - ftn
    - ffp
    - pc
    - cryo
    - pheresis
  fluids_agg_labels:
    - d5w
    - hes
    - psa
    - hs
    - ns
    - hns
    - alb20
    - alb5
    - d10w
    - d50w
  anesthetic_labels:
    - etdes
    - etsevo
  base_ignore_cols:
    - op_id
    - age
    - emop
    - num_card_events
    - antype
    - sex
    - asa
  high_missing_threshold_pct: 10.0
  knn_neighbors: 5
  outlier_quantiles:
    lower_extreme: 0.01
    upper_extreme: 0.99
    lower_fill_low: 0.005
    lower_fill_high: 0.05
    upper_fill_low: 0.95
    upper_fill_high: 0.995
sequence:
  pad_length: 200
  presence_threshold: 0.25
  fill_value: 0.0
  interpolation_step_minutes: 5
  normalize_timeseries: true
splits:
  random_state: 42
  use_bootstrapping: true
  n_bootstrap_iterations: 25
  n_cv_folds: 5
  holdout_fraction: 0.2
  hpo_validation_fraction_within_train: 0.25
  sequence_validation_fraction: 0.15
  tabular_mlp_validation_fraction: 0.2
models:
  tabular_enabled:
    - log_reg
    - autogluon
    - xgb
    - rf
    - svm
    - mlp
    - knn
    - asa_rule
    - gs_aki_rule
  sequence_enabled:
    - lstm_only
    - hybrid
  tabular_hpo_enabled:
    - log_reg
    - xgb
    - rf
    - svm
    - mlp
    - knn
  sequence_hpo_enabled:
    - lstm_only
    - hybrid
  hpo:
    n_trials: 50
    tabular_mlp_epochs: 100
    sequence_epochs: 150
    sequence_patience: 15
    sequence_batch_size: 4096
  autogluon:
    time_limit_seconds: 600
    presets: best_quality
    num_cpus: 32
    num_gpus: auto
  tabular_defaults:
    log_reg: {C: 1.0}
    xgb: {}
    rf: {}
    svm: {C: 1.0}
    knn: {n_neighbors: 5}
    mlp:
      lr: 0.001
      n_layers: 2
      n_units: 32
      dropout_rate: 0.5
  tabular_hpo_params:
    preop:
      log_reg: {C: 0.19863}
      xgb: {n_estimators: 515, learning_rate: 0.01148, max_depth: 9, subsample: 0.7182, colsample_bytree: 0.6793, gamma: 0.01291}
      rf: {n_estimators: 778, max_depth: 14, min_samples_split: 7, min_samples_leaf: 9, max_features: log2}
      svm: {C: 0.002052}
      knn: {n_neighbors: 315}
      mlp: {lr: 0.001828, n_layers: 2, n_units: 69, dropout_rate: 0.3610832}
    intraop:
      log_reg: {C: 141.3782}
      xgb: {n_estimators: 675, learning_rate: 0.0105, max_depth: 6, subsample: 0.8110, colsample_bytree: 0.6934, gamma: 2.3038}
      rf: {n_estimators: 309, max_depth: 15, min_samples_split: 5, min_samples_leaf: 10, max_features: sqrt}
      svm: {C: 0.2005}
      knn: {n_neighbors: 324}
      mlp: {lr: 0.0027, n_layers: 1, n_units: 106, dropout_rate: 0.6151}
    combined:
      log_reg: {C: 0.0006}
      xgb: {n_estimators: 1110, learning_rate: 0.0172, max_depth: 9, subsample: 0.8281, colsample_bytree: 0.7827, gamma: 1.7456}
      rf: {n_estimators: 597, max_depth: 17, min_samples_split: 10, min_samples_leaf: 7, max_features: sqrt}
      svm: {C: 0.0001}
      knn: {n_neighbors: 484}
      mlp: {lr: 0.0004, n_layers: 4, n_units: 114, dropout_rate: 0.4839}
  sequence_defaults:
    learning_rate: 0.001
    epochs: 1000
    batch_size: 4096
    patience: 20
    es_check_interval: 5
    lr_scheduler_patience: 7
    lr_scheduler_factor: 0.1
    gradient_clip_value: 1.0
    lstm_hidden_size: 128
    lstm_num_layers: 2
    mlp_dims: [256, 128, 64]
    dropout_rate: 0.4
  sequence_hpo_params:
    lstm_only:
      lr: 0.000015
      dropout_rate: 0.363015
      lstm_hidden_size: 50
      lstm_num_layers: 4
    hybrid:
      lr: 0.000017
      dropout_rate: 0.467438
      lstm_hidden_size: 66
      lstm_num_layers: 2
      mlp_dims: [120, 155]
  tabular_hpo_search_spaces:
    log_reg: {C: [0.0001, 10000.0]}
    xgb: {n_estimators: [200, 2000], learning_rate: [0.01, 0.3], max_depth: [3, 10], subsample: [0.6, 1.0], colsample_bytree: [0.6, 1.0], gamma: [0.0, 5.0]}
    rf: {n_estimators: [100, 1000], max_depth: [5, 50], min_samples_split: [2, 20], min_samples_leaf: [1, 20]}
    svm: {C: [0.0001, 10000.0]}
    knn: {n_neighbors: [5, 500]}
    mlp: {lr: [0.00001, 0.1], n_layers: [1, 4], n_units: [4, 128], dropout_rate: [0.2, 0.7]}
  sequence_hpo_search_spaces:
    lstm_only: {lr: [0.00001, 0.01], lstm_hidden_size: [16, 256], lstm_num_layers: [1, 4], dropout_rate: [0.1, 0.6]}
    hybrid: {lr: [0.00001, 0.01], lstm_hidden_size: [16, 128], lstm_num_layers: [1, 3], n_mlp_layers: [1, 4], mlp_layer_size: [16, 256], dropout_rate: [0.1, 0.6]}
calibration:
  method: isotonic
  cv_folds: 5
  threshold_metric: f2
  threshold_min: 0.01
  threshold_max: 0.99
  threshold_steps: 200
evaluation:
  bootstrap_reps: 1000
  dca_threshold_min: 0.01
  dca_threshold_max: 0.305
  dca_threshold_step: 0.005
reports:
  table_formats: [html, md, csv]
  figure_formats: [png, svg]
  figure_png_dpi: 600
  style_variant: legacy_manuscript
  highlight_best_values: true
  generate_supplemental_outputs: true
  procedure_audit:
    cms_order_zip_path: external/cms_icd10pcs/april-1-2026-icd10pcs-order.zip
    ct_department_code: CTS
    definite_cardiac_prefixes: ["02"]
    definite_thoracic_prefixes: [0B]
    manual_review_if_cpb_discordant: true
  max_display_features: 20
  manuscript_sections:
    - consort
    - tables
    - curves
    - statistics
    - reclassification
    - shap
  shap_jobs:
    - {run_name: XGBoost_Combined, model_key: xgb, dataset_regime: combined}
    - {run_name: XGBoost_Preop, model_key: xgb, dataset_regime: preop}
    - {run_name: XGBoost_Intraop, model_key: xgb, dataset_regime: intraop}
    - {run_name: RandomForest_Combined, model_key: rf, dataset_regime: combined}
    - {run_name: RandomForest_Preop, model_key: rf, dataset_regime: preop}
    - {run_name: RandomForest_Intraop, model_key: rf, dataset_regime: intraop}
    - {run_name: LogReg_Combined, model_key: log_reg, dataset_regime: combined}
    - {run_name: LogReg_Preop, model_key: log_reg, dataset_regime: preop}
    - {run_name: LogReg_Intraop, model_key: log_reg, dataset_regime: intraop}
runtime:
  profile: throughput
  cpu_reserve_fraction: 0.0625
  cpu_reserve_min: 2
  ram_reserve_fraction: 0.1
  ram_reserve_gb_min: 8
  progress_interval_seconds: 60
  csv_engine: pyarrow
  nested_blas_threads: 1
  orchestration:
    mode: overlap
  gpu:
    enabled: auto
    max_concurrent_jobs: 1
    sequence_use_gpu: auto
    xgb_use_gpu: false
  stages:
    csv_read_threads: 24
    preop_feature_workers: auto
    tabular_column_workers: 24
    timeseries_workers: 24
    timeseries_partitions: auto
    sequence_workers: 24
    sequence_partitions: auto
    evaluation_workers: 24
    bootstrap_workers: 24
    report_workers: 16
    shap_workers: 6
    train_model_threads: auto
    hpo_model_threads: auto
    dataloader_workers: auto
    torch_num_threads: auto
  log_level: INFO
